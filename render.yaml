services:
  - type: web
    name: fitness-tracker
    env: docker
    plan: free
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: fitness-tracker-db
          property: connectionString

databases:
  - name: fitness-tracker-db
    plan: free
    databaseName: fitness_tracker_production
    user: fitness_tracker
